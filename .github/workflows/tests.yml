name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # The test settings inherit the production settings, which read these at
    # import time. The DB ones must match the postgres service below; the
    # others just need to be present (ADMIN_EMAILS is .split() with no default).
    env:
      DJANGO_SECRET_KEY: test-secret-key-not-used-in-production
      DB_USER: rainbow
      DB_PASSWORD: rainbow
      DB_HOST: localhost
      ADMIN_EMAILS: admin@example.com

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: rainbow
          POSTGRES_USER: rainbow
          POSTGRES_PASSWORD: rainbow
        ports:
          - 5432:5432
        # Wait until postgres is ready before running the steps.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: rainbow

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: rainbow/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest
